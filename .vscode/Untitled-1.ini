{
  "folders": [
    { "path": "arca_core" },
    { "path": "phases" },
    { "path": "scripts" },
    { "path": "docs" },
    { "path": "ci" },
    { "path": "tests" },
    { "path": "reslang" }
  ],
  "settings": {
    "python.pythonPath": "venv/bin/python3",
    "jupyter.jupyterServerType": "local",
