name: ArcaLang CI and Docs

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v --disable-warnings --maxfail=1

      - name: Collect phase plot into docs assets
        if: always()
        run: |
          mkdir -p docs/assets
          FOUND_PLOT=$(find . -name "phase_transition_plot.png" | head -n 1 || true)
          if [ -n "$FOUND_PLOT" ]; then
            cp "$FOUND_PLOT" docs/assets/phase_transition_plot.png
          fi

      - name: Upload phase transition plot artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase-transition-plot
          path: |
            **/phase_transition_plot.png

  docs:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
