name: Docs & Diagrams

on:
  push:
    paths:
      - "docs/**"
      - ".github/workflows/docs-and-diagrams.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1. Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # 2. Install system dependencies
      # -----------------------------
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install Node.js (for Mermaid CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      # -----------------------------
      # 3. Generate DOT → SVG diagrams
      # -----------------------------
      - name: Generate DOT diagrams
        run: |
          DIAG_DIR="docs/metapysics/assets/diagrams"
          for f in $DIAG_DIR/*.dot; do
            svg="${f%.dot}.svg"
            echo "Generating $svg"
            dot -Tsvg "$f" -o "$svg"
          done

      # -----------------------------
      # 4. Generate Mermaid → SVG diagrams
      # -----------------------------
      - name: Generate Mermaid diagrams
        run: |
          mmdc -i docs/metapysics/metapysics_dependencies.md \
               -o docs/metapysics/assets/diagrams/metapysics_dependencies_mermaid.svg

      # -----------------------------
      # 5. Install MkDocs
      # -----------------------------
      - name: Install MkDocs + Material
        run: |
          pip install mkdocs-material
          pip install mkdocs-mermaid2-plugin

      # -----------------------------
      # 6. Build documentation
      # -----------------------------
      - name: Build documentation
        run: mkdocs build --clean

      # -----------------------------
      # 7. Commit updated diagrams
      # -----------------------------
      - name: Commit generated diagrams
        if: github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/metapysics/assets/diagrams/*.svg
          if ! git diff --cached --quiet; then
            git commit -m "Update diagrams (DOT + Mermaid)"
            git push
          fi

      # -----------------------------
      # 8. Deploy to GitHub Pages
      # -----------------------------
      - name: Deploy documentation
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
